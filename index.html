// ── JWT decode (no lib) ───────────────────────────────────
function parseJwt(token) {
  try {
    const base64 = token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
    return JSON.parse(decodeURIComponent(atob(base64).split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join('')));
  } catch { return null; }
}

// ── Login Screen ──────────────────────────────────────────
function LoginScreen({ onLogin, onDenied }) {
  useEffect(() => {
    const interval = setInterval(() => {
      if (window.google && window.google.accounts) {
        clearInterval(interval);
        window.google.accounts.id.initialize({
          client_id: GOOGLE_CLIENT_ID,
          callback: (response) => {
            const payload = parseJwt(response.credential);
            if (!payload) return;
            if (ALLOWED_EMAILS.includes(payload.email)) {
              onLogin({ name: payload.name, email: payload.email, picture: payload.picture });
            } else {
              onDenied(payload.email);
            }
          }
        });
        window.google.accounts.id.renderButton(
          document.getElementById('g-signin-btn'),
          { theme:'outline', size:'large', text:'signin_with', locale:'ja', width:280 }
        );
      }
    }, 200);
    return () => clearInterval(interval);
  }, []);

  return (
    <div style={{minHeight:"100vh",background:"#F2F2F2",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}}>
      <div className="fade-in" style={{background:"#FFF",borderRadius:"24px",padding:"40px 32px",textAlign:"center",maxWidth:"340px",width:"100%",boxShadow:"0 8px 40px rgba(0,0,0,0.1)"}}>

        <p style={{fontSize:"11px",color:"#CCC",marginTop:"20px"}}>許可されたアカウントのみ利用できます</p>
      </div>
    </div>
  );
}

// ── Review Modal ──────────────────────────────────────────

// ── AI Suggest Modal ──────────────────────────────────────
function AISuggestModal({fridge,meals,reviews,apiKey,onApply,onClose}){
  const [angle,setAngle]=useState(null);
  const [moodInput,setMoodInput]=useState("");
  const [chefInput,setChefInput]=useState("栗原はるみ");
  const [nutritionInput,setNutritionInput]=useState("野菜不足を補いたい");
  const [loading,setLoading]=useState(false);
  const [result,setResult]=useState(null);
  const [error,setError]=useState("");

  const fridgeItems=fridge.map(f=>f.name).join("、")||"なし";
  const favorites=Object.entries(reviews).filter(([,rv])=>rv&&Object.values(rv).some(r=>r.makeAgain||r.stars>=4)).map(([key])=>key.split("-").slice(3).join("-")).filter((v,i,a)=>v&&a.indexOf(v)===i).slice(0,10);

  const callGemini = async (prompt) => {
    const url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + apiKey;
    const res = await fetch(url, {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})});
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    return data.candidates[0].content.parts[0].text;
  };

  const buildPrompt=()=>{
    const base="今週の献立（朝・昼・夜×7日）を提案。各食事は主菜・副菜・汁物の3種類。冷蔵庫:"+fridgeItems;
    if(angle==="fridge")    return base+"\n冷蔵庫の食材をできるだけ使い切る献立にしてください。";
    if(angle==="favorite")  return base+"\nお気に入りメニュー:"+(favorites.join("、")||"なし")+"\nこれらを参考に似た献立を提案してください。";
    if(angle==="mood")      return base+"\n気分:「"+(moodInput||"さっぱりしたもの")+"」に合う献立を。";
    if(angle==="chef")      return base+"\n「"+chefInput+"」さんのスタイルで提案。";
    if(angle==="nutrition") return base+"\n栄養:「"+nutritionInput+"」を意識した献立を。";
    return base;
  };

  const suggest=async()=>{
    if(!apiKey){setError("設定からGemini APIキーを入力してください。");return;}
    setLoading(true);setError("");setResult(null);
    try{
      const sys='JSONのみ返答。バッククォート不要。\n形式:{"月曜日":{"朝":{"主菜":{"name":"","memo":"","url":""},"副菜":{"name":"","memo":"","url":""},"汁物":{"name":"","memo":"","url":""}},"昼":{...},"夜":{...}},...,"日曜日":{...}}\n朝は軽め。汁物は味噌汁・スープ。副菜は小鉢・サラダ。料理名は短く。memoには簡単な材料と調理ポイントを50字程度で。urlにはクックパッドやDelish Kitchenなど参考URLを入れる（例:https://cookpad.com/search/料理名）。';
      const text=await callGemini(sys+"\n\n"+buildPrompt());
      const raw=JSON.parse(text.replace(/```json|```/g,"").trim());
      const normalized={};
      ["月曜日","火曜日","水曜日","木曜日","金曜日","土曜日","日曜日"].forEach(d=>{
        normalized[d]={};
        ["朝","昼","夜"].forEach(mt=>{
          normalized[d][mt]={};
          ["主菜","副菜","汁物"].forEach(dt=>{
            const v=raw[d]&&raw[d][mt]&&raw[d][mt][dt];

            else normalized[d][mt][dt]={name:v.name||"",memo:v.memo||"",url:v.url||""};
          });
        });
      });
      setResult(normalized);
    }catch(e){setError("エラー: "+e.message);}
    setLoading(false);
  };

        {angle==="favorite"&&favorites.length===0&&<div style={{background:"#FFF8F0",borderRadius:"10px",padding:"10px 12px",marginBottom:"12px",fontSize:"12px",color:"#AA8800"}}>まだお気に入りがありません。感想タブで「また作って❤️」や★4以上をつけると反映されます。</div>}
        {angle==="mood"&&<input value={moodInput} onChange={e=>setMoodInput(e.target.value)} placeholder="例：さっぱり・がっつり・エスニック…" style={{width:"100%",border:"1.5px solid #E0E0E0",borderRadius:"10px",padding:"10px 12px",fontSize:"14px",fontFamily:"'Noto Sans JP',sans-serif",background:"#FFF",color:"#111",marginBottom:"12px"}}/>}
        {angle==="chef"&&<input value={chefInput} onChange={e=>setChefInput(e.target.value)} placeholder="例：栗原はるみ・有元葉子・土井善晴…" style={{width:"100%",border:"1.5px solid #E0E0E0",borderRadius:"10px",padding:"10px 12px",fontSize:"14px",fontFamily:"'Noto Sans JP',sans-serif",background:"#FFF",color:"#111",marginBottom:"12px"}}/>}
        {angle==="nutrition"&&<input value={nutritionInput} onChange={e=>setNutritionInput(e.target.value)} placeholder="例：野菜不足・タンパク質を増やしたい…" style={{width:"100%",border:"1.5px solid #E0E0E0",borderRadius:"10px",padding:"10px 12px",fontSize:"14px",fontFamily:"'Noto Sans JP',sans-serif",background:"#FFF",color:"#111",marginBottom:"12px"}}/>}
        {angle==="fridge"&&<div style={{background:"#F5F5F5",borderRadius:"10px",padding:"10px 12px",marginBottom:"12px",fontSize:"12px",color:"#666"}}>🧊 冷蔵庫: {fridgeItems}</div>}
        {angle&&!loading&&!result&&<button onClick={suggest} style={{width:"100%",padding:"13px",background:"#111",color:"#FFF",border:"none",borderRadius:"12px",cursor:"pointer",fontFamily:"'DM Sans','Noto Sans JP',sans-serif",fontSize:"15px",fontWeight:700}}>✨ 提案を生成する</button>}
        {loading&&<div style={{textAlign:"center",padding:"28px",color:"#888",fontSize:"13px"}}><div style={{fontSize:"30px",marginBottom:"10px",display:"inline-block",animation:"spin 1s linear infinite"}}>⏳</div><div>AIが献立を考えています…</div></div>}
        {error&&<div style={{background:"#FFF0F0",borderRadius:"10px",padding:"10px 12px",fontSize:"12px",color:"#CC3333",marginBottom:"8px"}}>{error}</div>}
        {result&&(
          <div className="fade-in">
            <div style={{fontSize:"13px",fontWeight:700,color:"#111",marginBottom:"10px"}}>提案された献立</div>
            <div style={{background:"#FFF",borderRadius:"14px",overflow:"hidden",marginBottom:"12px",border:"1px solid #EBEBEB"}}>
              {DAYS.map((day,i)=>(
                <div key={day} style={{padding:"10px 14px",borderBottom:i<6?"1px solid #F0F0F0":"none"}}>
                  <div style={{fontSize:"10px",fontWeight:700,color:"#999",letterSpacing:"1px",marginBottom:"5px"}}>{DAY_SHORT[i]}</div>
                  {MEAL_TYPES.map(mt=>(<div key={mt} style={{marginBottom:"4px",display:"flex",alignItems:"center",gap:"5px",flexWrap:"wrap"}}><span style={{fontSize:"11px",color:"#999",minWidth:"36px"}}>{MEAL_EMOJI[mt]} {mt}</span>{DISH_TYPES.map(dt=><span key={dt} style={{fontSize:"11px",color:"#444",background:"#F5F5F5",padding:"1px 7px",borderRadius:"5px"}}>{result[day]&&result[day][mt]?(result[day][mt][dt]&&result[day][mt][dt].name||"−"):"−"}</span>)}</div>))}
                </div>
              ))}
            </div>
            <div style={{display:"flex",gap:"8px"}}>
              <button onClick={()=>onApply(result)} style={{flex:1,padding:"12px",background:"#111",color:"#FFF",border:"none",borderRadius:"12px",cursor:"pointer",fontFamily:"'Noto Sans JP',sans-serif",fontSize:"14px",fontWeight:700}}>この献立を適用する</button>
              <button onClick={suggest} style={{padding:"12px 14px",background:"#EBEBEB",color:"#666",border:"none",borderRadius:"12px",cursor:"pointer",fontFamily:"'Noto Sans JP',sans-serif",fontSize:"12px",fontWeight:600}}>再提案</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

  const avgSt=rv=>{if(!rv)return 0;const v=Object.values(rv).map(r=>r.stars).filter(s=>s>0);return v.length?Math.round(v.reduce((a,b)=>a+b,0)/v.length):0;};

                        <div style={{display:"flex",flexDirection:"column",alignItems:"center",minWidth:"24px"}}>
                          <span style={{fontSize:"14px"}}>{MEAL_EMOJI[mt]}</span>
                          <span style={{fontSize:"10px",fontWeight:700,color:"#999",marginTop:"1px"}}>{mt}</span>
                        </div>
                        <div style={{flex:1}}>
                          {editCell===d+"-"+mt+"-主菜"?(
                            <div style={{display:"flex",gap:"6px",alignItems:"center"}}>
                              <input autoFocus value={editVal} onChange={e=>setEditVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveEdit(d,mt,"主菜")} placeholder="主菜を入力…" style={{flex:1,border:"1.5px solid #DDD",borderRadius:"8px",padding:"7px 10px",fontSize:"14px",fontFamily:"'Noto Sans JP',sans-serif",background:"#FFF",color:"#111"}}/>
                              <button onClick={()=>saveEdit(d,mt,"主菜")} style={{padding:"7px 11px",background:"#111",color:"#FFF",border:"none",borderRadius:"8px",cursor:"pointer",fontSize:"12px",fontWeight:700,fontFamily:"'Noto Sans JP',sans-serif"}}>保存</button>
                            </div>
                          ):(
                            <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
                              <div onClick={e=>{e.stopPropagation();startEdit(d,mt,"主菜");}} style={{fontSize:"14px",color:md.name?"#111":"#CCC",fontWeight:md.name?600:400,cursor:"text",flex:1}}>{md.name||"主菜を入力…"}</div>
                              {md.name&&(
                                <div style={{display:"flex",alignItems:"center",gap:"4px",flexShrink:0}}>
                                  {ma>0&&<span style={{fontSize:"11px",color:"#F5C842"}}>{"★".repeat(ma)}</span>}
                                  {mka(mrv)&&<span style={{fontSize:"11px"}}>❤️</span>}
                                  {(md.recipeNote||md.recipeUrl)&&<span style={{fontSize:"11px"}}>📝</span>}
                                  <button onClick={e=>{e.stopPropagation();setReviewModal({d,mt,dt:"主菜",dish:md.name});}} style={{padding:"3px 7px",background:"#EBEBEB",border:"none",borderRadius:"6px",cursor:"pointer",fontSize:"10px",color:"#555",fontWeight:700,fontFamily:"'Noto Sans JP',sans-serif"}}>感想</button>
                                  <button onClick={e=>{e.stopPropagation();setRecipeModal({d,mt,dt:"主菜"});}} style={{padding:"3px 7px",background:"#EBEBEB",border:"none",borderRadius:"6px",cursor:"pointer",fontSize:"10px",color:"#555",fontWeight:700,fontFamily:"'Noto Sans JP',sans-serif"}}>レシピ</button>
                                  <button onClick={e=>{e.stopPropagation();clearDish(d,mt,"主菜");}} style={{padding:"3px 7px",background:"#FFEEEE",border:"none",borderRadius:"6px",cursor:"pointer",fontSize:"10px",color:"#CC4444",fontWeight:700,fontFamily:"'Noto Sans JP',sans-serif"}}>×</button>
                                </div>
                              )}
                            </div>
                          )}
                        </div>
                        <button onClick={e=>{e.stopPropagation();toggleExp(d,mt);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:"14px",color:"#CCC",padding:"2px",lineHeight:1,flexShrink:0}}>{isEx?"▲":"▼"}</button>
                      </div>
                      {isEx&&["副菜","汁物"].map(dt=>(
                        <div key={dt} style={{display:"flex",alignItems:"center",gap:"8px",padding:"8px 12px",background:"#FAFAFA",borderRadius:"10px",border:"1px solid #F0F0F0",marginTop:"4px",marginLeft:"12px"}}>
                          <span style={{fontSize:"13px",minWidth:"18px",textAlign:"center"}}>{DISH_EMOJI[dt]}</span>
                          <span style={{fontSize:"10px",color:"#AAA",fontWeight:700,minWidth:"26px"}}>{dt}</span>
                          <div style={{flex:1}}>
                            {editCell===d+"-"+mt+"-"+dt?(
                              <div style={{display:"flex",gap:"6px",alignItems:"center"}}>
                                <input autoFocus value={editVal} onChange={e=>setEditVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveEdit(d,mt,dt)} placeholder={dt+"を入力…"} style={{flex:1,border:"1.5px solid #DDD",borderRadius:"8px",padding:"6px 9px",fontSize:"13px",fontFamily:"'Noto Sans JP',sans-serif",background:"#FFF",color:"#111"}}/>
                                <button onClick={()=>saveEdit(d,mt,dt)} style={{padding:"6px 10px",background:"#111",color:"#FFF",border:"none",borderRadius:"8px",cursor:"pointer",fontSize:"11px",fontWeight:700,fontFamily:"'Noto Sans JP',sans-serif"}}>保存</button>
                              </div>
                            ):(
                              <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
                                <div onClick={e=>{e.stopPropagation();startEdit(d,mt,dt);}} style={{fontSize:"13px",color:meals[d][mt][dt].name?"#333":"#CCC",cursor:"text",flex:1}}>{meals[d][mt][dt].name||(dt+"を入力…")}</div>
                                {meals[d][mt][dt].name&&<button onClick={e=>{e.stopPropagation();setRecipeModal({d,mt,dt});}} style={{padding:"2px 6px",background:"#EBEBEB",border:"none",borderRadius:"5px",cursor:"pointer",fontSize:"10px",color:"#555",fontWeight:700,fontFamily:"'Noto Sans JP',sans-serif"}}>レシピ</button>}
                                {meals[d][mt][dt].name&&<button onClick={e=>{e.stopPropagation();clearDish(d,mt,dt);}} style={{padding:"2px 6px",background:"#FFEEEE",border:"none",borderRadius:"5px",cursor:"pointer",fontSize:"10px",color:"#CC4444",fontWeight:700,fontFamily:"'Noto Sans JP',sans-serif"}}>×</button>}
                              </div>
                            )}
                          </div>
                        </div>
                      ))}
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>
      )}

      {tab==="review"&&(
        <div style={{padding:"0 20px 100px"}}>
          {rvLog.filter(r=>r.mka).length>0&&(<div style={{marginBottom:"18px"}}><div style={{fontSize:"11px",fontWeight:700,letterSpacing:"2px",color:"#999",textTransform:"uppercase",marginBottom:"8px",fontFamily:"'DM Sans',sans-serif"}}>❤️ また作りたいリスト</div><div style={{...CS,padding:"0",overflow:"hidden"}}>{rvLog.filter(r=>r.mka).map((r,i,a)=>(<div key={r.key} style={{display:"flex",alignItems:"center",gap:"10px",padding:"12px 14px",borderBottom:i<a.length-1?"1px solid #F0F0F0":"none"}}><span style={{fontSize:"16px"}}>❤️</span><div style={{flex:1}}><div style={{fontSize:"14px",fontWeight:700,color:"#111"}}>{r.n}</div><div style={{fontSize:"11px",color:"#999",marginTop:"2px"}}>{r.d} {MEAL_EMOJI[r.mt]} {r.mt} · {r.dt}</div></div>{r.avg>0&&<span style={{fontSize:"12px",color:"#F5C842",fontWeight:700}}>{"★".repeat(r.avg)}</span>}</div>))}</div></div>)}
          <div style={{fontSize:"11px",fontWeight:700,letterSpacing:"2px",color:"#999",textTransform:"uppercase",marginBottom:"10px",fontFamily:"'DM Sans',sans-serif"}}>📝 感想ログ</div>
          {rvLog.length===0?<div style={{textAlign:"center",padding:"48px",color:"#CCC",fontSize:"14px"}}><div style={{fontSize:"36px",marginBottom:"12px"}}>💬</div>献立タブの「感想」ボタンから記録できます</div>
          :rvLog.map(r=>(<div key={r.key} style={CS}><div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:"10px"}}><div><div style={{fontSize:"15px",fontWeight:700,color:"#111"}}>{r.n}</div><div style={{fontSize:"11px",color:"#999",marginTop:"2px"}}>{r.d} · {MEAL_EMOJI[r.mt]} {r.mt} · {r.dt}</div></div><div style={{display:"flex",gap:"5px",alignItems:"center"}}>{r.mka&&<span style={{fontSize:"11px",background:"#111",color:"#FFF",borderRadius:"7px",padding:"2px 7px",fontWeight:700}}>また作って！</span>}{r.avg>0&&<span style={{fontSize:"12px",color:"#F5C842",fontWeight:700}}>{"★".repeat(r.avg)}</span>}</div></div>{MEMBERS.map(m=>{const mv=r.rv[m.id];if(!mv||(!mv.stars&&!mv.comment&&!mv.makeAgain&&!mv.photo))return null;return(<div key={m.id} style={{display:"flex",gap:"9px",alignItems:"flex-start",padding:"8px 10px",background:"#F7F7F7",borderRadius:"10px",marginBottom:"6px"}}><span style={{fontSize:"16px"}}>{m.icon}</span><div style={{flex:1}}><div style={{display:"flex",alignItems:"center",gap:"5px",marginBottom:"3px"}}><span style={{fontSize:"12px",fontWeight:700,color:"#111"}}>{m.name}</span>{mv.stars>0&&<span style={{fontSize:"11px",color:"#F5C842"}}>{"★".repeat(mv.stars)}</span>}{mv.makeAgain&&<span style={{fontSize:"11px"}}>❤️</span>}</div>{mv.comment&&<div style={{fontSize:"13px",color:"#444",lineHeight:1.5}}>{mv.comment}</div>}{mv.photo&&<img src={mv.photo} alt="" style={{width:"52px",height:"52px",borderRadius:"8px",objectFit:"cover",marginTop:"6px"}}/>}</div></div>);})}<button onClick={()=>setReviewModal({d:r.d,mt:r.mt,dt:r.dt,dish:r.n})} style={{marginTop:"8px",padding:"5px 11px",background:"#EBEBEB",border:"none",borderRadius:"7px",cursor:"pointer",fontSize:"12px",color:"#666",fontWeight:600,fontFamily:"'Noto Sans JP',sans-serif"}}>編集</button></div>))}
        </div>
      )}

      {tab==="fridge"&&(
        <div style={{padding:"0 20px 100px"}}>
          <div style={{display:"flex",gap:"8px",marginBottom:"12px"}}>{[{l:"食材数",v:fridge.length+"品",i:"🥬"},{l:"期限注意",v:fridge.filter(f=>expSt(f.exp)==="soon").length+"品",i:"⚠️"},{l:"期限切れ",v:fridge.filter(f=>expSt(f.exp)==="expired").length+"品",i:"🚫"}].map(s=>(<div key={s.l} style={{flex:1,background:"#FFF",borderRadius:"14px",padding:"12px",textAlign:"center",border:"1px solid #EBEBEB"}}><div style={{fontSize:"18px",marginBottom:"4px"}}>{s.i}</div><div style={{fontSize:"16px",fontWeight:700,color:"#111"}}>{s.v}</div><div style={{fontSize:"10px",color:"#999",marginTop:"2px"}}>{s.l}</div></div>))}</div>
          <button onClick={()=>setShowFA(p=>!p)} style={{width:"100%",padding:"12px",border:"1.5px dashed #DDD",borderRadius:"14px",background:"transparent",cursor:"pointer",fontFamily:"'Noto Sans JP',sans-serif",fontSize:"14px",fontWeight:600,color:"#888",marginBottom:"12px"}}>＋ 食材を追加</button>
          {showFA&&(<div style={{...CS,marginBottom:"12px"}}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"10px"}}><input value={nf.name} onChange={e=>setNf(p=>({...p,name:e.target.value}))} placeholder="食材名" style={inp2}/><input value={nf.qty} onChange={e=>setNf(p=>({...p,qty:e.target.value}))} placeholder="量（例：3個）" style={inp2}/></div><div style={{display:"flex",gap:"6px",marginBottom:"10px",flexWrap:"wrap"}}>{FRIDGE_CATS.map(c=><button key={c} onClick={()=>setNf(p=>({...p,cat:c}))} style={{padding:"4px 10px",borderRadius:"20px",border:"none",cursor:"pointer",fontSize:"12px",fontFamily:"'Noto Sans JP',sans-serif",fontWeight:600,background:nf.cat===c?"#111":"#EBEBEB",color:nf.cat===c?"#FFF":"#666"}}>{c}</button>)}</div><div style={{display:"flex",gap:"8px",alignItems:"center"}}><input type="date" value={nf.exp} onChange={e=>setNf(p=>({...p,exp:e.target.value}))} style={{...inp2,flex:1,color:"#888"}}/><button onClick={addFridge} style={{padding:"9px 18px",background:"#111",color:"#FFF",border:"none",borderRadius:"10px",cursor:"pointer",fontFamily:"'Noto Sans JP',sans-serif",fontSize:"13px",fontWeight:700}}>追加</button></div></div>)}
          {Object.entries(fbg).map(([cat,items])=>(<div key={cat} style={{marginBottom:"12px"}}><div style={{fontSize:"11px",fontWeight:700,letterSpacing:"2px",color:"#999",textTransform:"uppercase",marginBottom:"7px",paddingLeft:"2px",fontFamily:"'DM Sans',sans-serif"}}>{cat}</div><div style={{background:"#FFF",borderRadius:"14px",overflow:"hidden",border:"1px solid #EBEBEB"}}>{items.map((item,idx)=>{const es=expSt(item.exp);return(<div key={item.id} style={{display:"flex",alignItems:"center",padding:"12px 14px",borderBottom:idx<items.length-1?"1px solid #F0F0F0":"none"}}><div style={{flex:1}}><div style={{display:"flex",alignItems:"center",gap:"7px"}}><span style={{fontSize:"14px",fontWeight:600,color:"#111"}}>{item.name}</span>{es==="expired"&&<span style={{fontSize:"11px",background:"#FF4444",color:"#FFF",borderRadius:"6px",padding:"1px 6px",fontWeight:700}}>期限切れ</span>}{es==="soon"&&<span style={{fontSize:"11px",background:"#FF9900",color:"#FFF",borderRadius:"6px",padding:"1px 6px",fontWeight:700}}>もうすぐ</span>}</div><div style={{display:"flex",gap:"10px",marginTop:"2px"}}><span style={{fontSize:"12px",color:"#999"}}>{item.qty||"−"}</span>{item.exp&&<span style={{fontSize:"12px",color:es==="ok"?"#999":es==="soon"?"#FF9900":"#FF4444"}}>{item.exp}</span>}</div></div><button onClick={()=>rmFridge(item.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:"18px",color:"#CCC",padding:"4px",lineHeight:1}}>×</button></div>);})}</div></div>))}
          {fridge.length===0&&<div style={{textAlign:"center",padding:"48px",color:"#CCC",fontSize:"14px"}}><div style={{fontSize:"36px",marginBottom:"12px"}}>🧊</div>食材を追加してください</div>}
        </div>
      )}

      {tab==="shopping"&&(
        <div style={{padding:"0 20px 100px"}}>
          <div style={{...CS,marginBottom:"12px"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}><span style={{fontSize:"11px",fontWeight:700,color:"#999",letterSpacing:"2px",textTransform:"uppercase",fontFamily:"'DM Sans',sans-serif"}}>Liste des Courses</span><span style={{fontSize:"14px",color:"#111",fontWeight:700}}>{sd} / {st}</span></div><div style={{height:"5px",background:"#F0F0F0",borderRadius:"3px",overflow:"hidden"}}><div style={{height:"100%",width:st?Math.round((sd/st)*100)+"%":"0%",background:"#111",borderRadius:"3px",transition:"width 0.4s ease"}}/></div></div>
          <div style={{display:"flex",gap:"8px",marginBottom:"12px"}}>
            <button onClick={()=>{setShowTmpl(p=>!p);setShowAuto(false);}} style={tabBtn(showTmpl)}>📦 テンプレ</button>
            <button onClick={()=>{setShowAuto(p=>!p);setShowTmpl(false);}} style={tabBtn(showAuto)}>✨ AI提案</button>
          </div>
          {showTmpl&&(<div style={{...CS,marginBottom:"12px"}}><div style={{fontSize:"13px",fontWeight:700,color:"#111",marginBottom:"10px"}}>テンプレートから追加</div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"7px"}}>{TEMPLATES.map(t=>(<button key={t.id} onClick={()=>addTmpl(t)} style={{padding:"12px 10px",border:"1px solid #EBEBEB",borderRadius:"12px",background:"#FAFAFA",cursor:"pointer",textAlign:"left",fontFamily:"'Noto Sans JP',sans-serif"}}><div style={{fontSize:"20px",marginBottom:"4px"}}>{t.icon}</div><div style={{fontSize:"12px",fontWeight:700,color:"#111",marginBottom:"2px"}}>{t.label}</div><div style={{fontSize:"10px",color:"#999"}}>{t.items.length}品目</div></button>))}</div></div>)}
          {showAuto&&(<div style={{...CS,marginBottom:"12px"}}><div style={{fontSize:"13px",fontWeight:700,color:"#111",marginBottom:"4px"}}>✨ AI 買い出し提案</div><div style={{fontSize:"12px",color:"#888",marginBottom:"10px",lineHeight:1.5}}>今週の献立から、冷蔵庫・リストにない食材のみを提案します。</div><div style={{background:"#F5F5F5",borderRadius:"10px",padding:"8px 12px",marginBottom:"10px",fontSize:"12px",color:"#666"}}>{"📋 "+(Object.values(meals).flatMap(d=>Object.values(d).flatMap(mt=>Object.values(mt).map(dt=>dt.name))).filter(Boolean).join("・")||"献立未入力")}</div>{aiSug.length===0&&!aiLoad&&<button onClick={genAuto} style={{width:"100%",padding:"12px",background:"#111",color:"#FFF",border:"none",borderRadius:"12px",cursor:"pointer",fontFamily:"'Noto Sans JP',sans-serif",fontSize:"14px",fontWeight:700}}>🤖 AIに食材を提案してもらう</button>}{aiLoad&&<div style={{textAlign:"center",padding:"20px",color:"#888",fontSize:"13px"}}><div style={{fontSize:"26px",marginBottom:"8px",display:"inline-block",animation:"spin 1s linear infinite"}}>⏳</div><div>分析中…</div></div>}{aiErr&&<div style={{background:"#FFF0F0",borderRadius:"10px",padding:"10px 12px",fontSize:"12px",color:"#CC3333"}}>{aiErr}</div>}{aiSug.length>0&&(<div><div style={{fontSize:"12px",fontWeight:700,color:"#111",marginBottom:"8px"}}>{aiSug.length}品の食材が見つかりました</div>{aiSug.map((item,i)=>(<div key={i} style={{display:"flex",alignItems:"center",background:"#F7F7F7",borderRadius:"10px",padding:"10px 12px",gap:"10px",marginBottom:"6px"}}><div style={{flex:1}}><span style={{fontSize:"14px",fontWeight:600,color:"#111"}}>{item.text}</span><span style={{fontSize:"11px",color:"#888",marginLeft:"7px",background:"#EBEBEB",padding:"1px 6px",borderRadius:"5px"}}>{item.cat}</span>{item.reason&&<div style={{fontSize:"11px",color:"#AAA",marginTop:"2px"}}>{"← "+item.reason}</div>}</div><button onClick={()=>addSug(item)} style={{padding:"6px 12px",background:"#111",color:"#FFF",border:"none",borderRadius:"8px",cursor:"pointer",fontSize:"12px",fontWeight:700,fontFamily:"'Noto Sans JP',sans-serif",flexShrink:0}}>追加</button></div>))}<div style={{display:"flex",gap:"8px",marginTop:"8px"}}><button onClick={addAll} style={{flex:1,padding:"10px",background:"#111",color:"#FFF",border:"none",borderRadius:"10px",cursor:"pointer",fontFamily:"'Noto Sans JP',sans-serif",fontSize:"13px",fontWeight:700}}>すべて追加</button><button onClick={genAuto} style={{padding:"10px 13px",background:"#EBEBEB",color:"#666",border:"none",borderRadius:"10px",cursor:"pointer",fontFamily:"'Noto Sans JP',sans-serif",fontSize:"12px",fontWeight:600}}>再提案</button></div></div>)}</div>)}
          <div style={{...CS,marginBottom:"12px"}}><div style={{display:"flex",gap:"8px",marginBottom:"10px"}}><input value={newItem} onChange={e=>setNewItem(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addShop()} placeholder="食材を手入力…" style={{flex:1,border:"1.5px solid #E0E0E0",borderRadius:"10px",padding:"10px 12px",fontSize:"14px",fontFamily:"'Noto Sans JP',sans-serif",background:"#FAFAFA",color:"#111"}}/><button onClick={addShop} style={{padding:"10px 16px",background:"#111",color:"#FFF",border:"none",borderRadius:"10px",cursor:"pointer",fontSize:"20px",fontWeight:700,lineHeight:1}}>+</button></div><div style={{display:"flex",gap:"5px",flexWrap:"wrap"}}>{SHOP_CATS.map(c=><button key={c} onClick={()=>setNewCat(c)} style={{padding:"3px 9px",borderRadius:"20px",border:"none",cursor:"pointer",fontSize:"11px",fontFamily:"'Noto Sans JP',sans-serif",fontWeight:600,background:newCat===c?"#111":"#EBEBEB",color:newCat===c?"#FFF":"#666"}}>{c}</button>)}</div></div>
          {Object.entries(sbg).map(([cat,items])=>(<div key={cat} style={{marginBottom:"12px"}}><div style={{fontSize:"11px",fontWeight:700,letterSpacing:"2px",color:"#999",textTransform:"uppercase",marginBottom:"7px",paddingLeft:"2px",fontFamily:"'DM Sans',sans-serif"}}>{cat}</div><div style={{background:"#FFF",borderRadius:"14px",overflow:"hidden",border:"1px solid #EBEBEB"}}>{items.map((item,idx)=>(<div key={item.id} style={{display:"flex",alignItems:"center",padding:"12px 14px",borderBottom:idx<items.length-1?"1px solid #F0F0F0":"none"}}><div onClick={()=>toggleShop(item.id)} style={{width:"24px",height:"24px",borderRadius:"8px",cursor:"pointer",flexShrink:0,border:item.done?"none":"1.5px solid #DDD",background:item.done?"#111":"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>{item.done&&<span style={{color:"#FFF",fontSize:"12px",fontWeight:700}}>✓</span>}</div><div style={{flex:1,marginLeft:"12px"}}><span style={{fontSize:"15px",fontWeight:item.done?400:500,color:item.done?"#CCC":"#111",textDecoration:item.done?"line-through":"none"}}>{item.text}</span>{item.done&&<div style={{fontSize:"10px",color:"#888",marginTop:"1px"}}>🧊 冷蔵庫に追加済み</div>}</div><button onClick={()=>rmShop(item.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:"18px",color:"#CCC",padding:"4px",lineHeight:1}}>×</button></div>))}</div></div>))}
          {st===0&&<div style={{textAlign:"center",padding:"48px",color:"#CCC",fontSize:"14px"}}><div style={{fontSize:"36px",marginBottom:"12px"}}>🛒</div>食材を追加してください</div>}
        </div>
      )}

      <div style={{position:"fixed",bottom:0,left:0,right:0,height:"70px",background:"linear-gradient(transparent,#F2F2F2)",pointerEvents:"none",zIndex:2}}/>

      {recipeModal&&(<RecipeModal dish={meals[recipeModal.d][recipeModal.mt][recipeModal.dt].name} existing={meals[recipeModal.d][recipeModal.mt][recipeModal.dt]} onSave={data=>{setMeals(p=>({...p,[recipeModal.d]:{...p[recipeModal.d],[recipeModal.mt]:{...p[recipeModal.d][recipeModal.mt],[recipeModal.dt]:{...p[recipeModal.d][recipeModal.mt][recipeModal.dt],...data}}}}));setRecipeModal(null);}} onClose={()=>setRecipeModal(null)}/>)}
      {reviewModal&&(<ReviewModal dish={reviewModal.dish} dayMeal={reviewModal.d+" "+MEAL_EMOJI[reviewModal.mt]+" "+reviewModal.mt+" · "+reviewModal.dt} existing={reviews[rvk(reviewModal.d,reviewModal.mt,reviewModal.dt,reviewModal.dish)]} onSave={rv=>{setReviews(p=>({...p,[rvk(reviewModal.d,reviewModal.mt,reviewModal.dt,reviewModal.dish)]:rv}));setReviewModal(null);}} onClose={()=>setReviewModal(null)}/>)}
      {showAI&&<AISuggestModal fridge={fridge} meals={meals} reviews={reviews} apiKey={apiKey} onApply={applyAI} onClose={()=>setShowAI(false)}/>}
      {showSettings&&<SettingsModal user={user||{name:"ゲスト",email:"",picture:null}} apiKey={apiKey} onSave={saveApiKey} onLogout={handleLogout} onClose={()=>setShowSettings(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
